name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Lint
      - name: Run Lint
        run: npx eslint . || true

      # 5. Build project
      - name: Build project
        run: npm run build

      # 6. Run Tests
      - name: Run Tests
        run: echo "No tests yet"

      # 7. Build Docker Image
      - name: Build Docker Image
        run: docker build -t production-backend .

      # 8. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 9. Tag Docker Image
      - name: Tag Docker Image
        run: docker tag production-backend gullu03/production-backend:latest

      # 10. Push Docker Image
      - name: Push Docker Image
        run: docker push gullu03/production-backend:latest